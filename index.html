<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🎁 Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb);
background-size:400% 400%;
animation:bgmove 12s infinite linear;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

#panel{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
animation:float 3s ease-in-out infinite;
position:relative;
z-index:10;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff6b81;
color:white;
cursor:pointer;
margin-left:10px;
}

#reward{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0.8);
opacity:0;
max-width:80%;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
transition:all 1s ease;
z-index:5;
}

.show{
opacity:1 !important;
transform:translate(-50%,-50%) scale(1) !important;
}

/* 熊猫 */

#panda{
position:absolute;
width:120px;
display:none;  /* 初始隐藏 */
transition:0.3s;
z-index:4;
mix-blend-mode:multiply; /* 让白底视觉上透明 */
transform-origin:center center;
clip-path:inset(0 0 50% 0); /* 只显示上半部分（头部） */
--rot:0deg;
}

/* 熊猫眨眼 */

.blink{
animation:blink 4s infinite;
}

@keyframes blink{
0%,92%,100%{transform:rotate(var(--rot)) scaleY(1);}
95%{transform:rotate(var(--rot)) scaleY(0.1);}
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:0;
}

</style>
</head>

<body>

<div id="panel">
<h2>🎁 输入密码领取奖励</h2>
<input id="pwd" type="password" placeholder="输入密码">
<button onclick="check()">解锁</button>
</div>

<img id="reward" src="imgs/image.jpg">
<img id="panda" src="imgs/pandas.jpg" class="blink">

<canvas id="confetti"></canvas>

<script>

const input=document.getElementById("pwd");
let unlocked=false;
let pandaTimer=null;

input.addEventListener("keydown",function(e){
if(e.key==="Enter"){check();}
});

function check(){

if(unlocked){
return;
}

if(input.value==="1234"){
unlocked=true;

document.getElementById("panel").style.display="none";

let img=document.getElementById("reward");
img.classList.add("show");

startConfetti();
startPanda();

}else{
alert("密码错误");
}

}

/* 熊猫系统 */

const panda=document.getElementById("panda");
let reward=document.getElementById("reward");

function startPanda(){

if(pandaTimer){
clearInterval(pandaTimer);
}

panda.style.display="block";

movePanda();

pandaTimer=setInterval(movePanda,1000);

}

/* 只从左右探头 */

function movePanda(){

let rect=reward.getBoundingClientRect();

if(rect.width===0 || rect.height===0){
return;
}

let side=Math.random()<0.5 ? "left":"right";

/* 只在上半部分探头，并避开上下边缘 */
let offset=0.12+Math.random()*0.30; // 12% ~ 42%

let size=120;

let x,y;
let rot;

if(side==="left"){

x=rect.left-size/2;  // 只露半个头
y=rect.top+rect.height*offset-size/2;
rot=-90;

}

if(side==="right"){

x=rect.right-size/2;
y=rect.top+rect.height*offset-size/2;
rot=90;

}

panda.style.left=x+"px";
panda.style.top=y+"px";
panda.style.setProperty("--rot",rot+"deg");

}

/* 点击熊猫逃跑 */

panda.onclick=function(){

panda.style.transform="scale(0.1) rotate(180deg)";

setTimeout(()=>{
panda.style.transform="";
movePanda();
},300);

}

/* 彩带 */

const canvas=document.getElementById("confetti");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let confettis=[];

function startConfetti(){

for(let i=0;i<150;i++){
confettis.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*6+2,
d:Math.random()*5+1
});
}

animate();
}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.beginPath();

for(let i=0;i<confettis.length;i++){

let c=confettis[i];

ctx.moveTo(c.x,c.y);
ctx.arc(c.x,c.y,c.r,0,Math.PI*2,true);

}

ctx.fill();
update();

requestAnimationFrame(animate);
}

function update(){

for(let i=0;i<confettis.length;i++){

let c=confettis[i];

c.y+=c.d;

if(c.y>canvas.height){
c.y=0;
c.x=Math.random()*canvas.width;
}

}

}

</script>

</body>
</html>
