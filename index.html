<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>🎁 Surprise</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial;
background: linear-gradient(-45deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb);
background-size:400% 400%;
animation:bgmove 12s infinite linear;
overflow:hidden;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 输入面板 */
#panel{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
text-align:center;
position:relative;
z-index:10;
}

input{
padding:10px;
font-size:18px;
border-radius:8px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
font-size:18px;
border:none;
border-radius:8px;
background:#ff6b81;
color:white;
cursor:pointer;
margin-left:10px;
}

/* 奖励图片 */
#reward{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
max-width:70%;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.3);
display:none;
z-index:5;
}

/* 熊猫 */
#panda{
position:absolute;
width:120px;
left:0;
top:0;
transform:translateY(100%);
transition:transform 0.6s ease;
z-index:4;
pointer-events:none;
}

</style>
</head>

<body>

<div id="panel">
<h2>🎁 输入密码领取奖励</h2>
<input id="pwd" type="password">
<button onclick="check()">解锁</button>
</div>

<img id="reward" src="imgs/image.jpg">
<img id="panda" src="imgs/pandas.jpg">

<script>

const reward = document.getElementById("reward");
const panda = document.getElementById("panda");

function check(){

if(document.getElementById("pwd").value==="1234"){

document.getElementById("panel").style.display="none";
reward.style.display="block";

setTimeout(startPanda,1000);

}else{
alert("密码错误");
}

}

function startPanda(){

setInterval(()=>{

let rect = reward.getBoundingClientRect();

let x = rect.left + Math.random()*rect.width;

panda.style.left = x + "px";
panda.style.top = (rect.top - 60) + "px";

/* 探头 */
panda.style.transform="translateY(0)";

setTimeout(()=>{
panda.style.transform="translateY(100%)";
},1500);

},3000);

}

</script>

</body>
</html>
